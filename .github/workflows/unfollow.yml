name: Unfollow Traitors

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 */8 * * *' # Runs every 8 hour
  workflow_dispatch: # Allows running manually

permissions:
  contents: write # Needed to commit followers.json

jobs:
  unfollow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run unfollow script
        env:
          GITHUB_TOKEN: ${{ secrets.USER_PAT }}
        run: python unfollow_traitors.py

      - name: Commit updated followers list
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add followers.json
          if [ -f traitors.txt ]; then git add traitors.txt; fi
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update followers list" && git push)
